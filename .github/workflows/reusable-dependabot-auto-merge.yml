name: Dependabot Auto-Merge

on:
  workflow_call:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Evaluate auto-merge eligibility
        id: evaluate
        run: |
          SKIP="false"

          # Gate 1: Block major version bumps
          if [[ "${{ steps.metadata.outputs.update-type }}" == "version-update:semver-major" ]]; then
            echo "Major update — requires human review"
            SKIP="true"
          fi

          # Gate 2: Block security scanner updates
          DEPS="${{ steps.metadata.outputs.dependency-names }}"
          for scanner in brakeman bundler-audit ruby_audit; do
            if echo "$DEPS" | grep -qiw "$scanner"; then
              echo "Contains $scanner — requires human review"
              SKIP="true"
            fi
          done

          # Gate 3: Block production dependency updates (bundler only)
          # GitHub Actions are always safe; bundler prod deps are not.
          ECOSYSTEM="${{ steps.metadata.outputs.package-ecosystem }}"
          DEP_TYPE="${{ steps.metadata.outputs.dependency-type }}"
          if [[ "$ECOSYSTEM" == "bundler" && "$DEP_TYPE" == "direct:production" ]]; then
            echo "Production runtime dependency — requires human review"
            SKIP="true"
          fi

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      - name: Auto-approve and enable auto-merge
        if: steps.evaluate.outputs.skip != 'true'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label auto-merged PRs
        if: steps.evaluate.outputs.skip != 'true'
        run: gh pr edit "$PR_URL" --add-label "auto-merge"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
